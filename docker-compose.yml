version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/jobhunt.db:/app/jobhunt.db
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:///./jobhunt.db
      - UPLOAD_DIR=/app/uploads
      # Set via .env or Docker secret in production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
